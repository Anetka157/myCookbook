<ion-content>
  <div class="profile-header">
    <div class="avatar-circle">
      <ion-icon name="person"></ion-icon>
    </div>
    <h2>{{ user?.displayName || 'Anetka' }}</h2>
    <p>{{ user?.email }}</p>
  </div>

  <div class="settings-container">
    <h3 class="section-title">Nastavení aplikace</h3>

    <ion-list lines="none">
      <ion-item class="settings-item">
        <ion-icon slot="start" name="notifications-outline"></ion-icon>
        <ion-label>Upozornění</ion-label>
        <ion-toggle
          slot="end"
          [checked]="notificationsEnabled"
          (ionChange)="toggleNotifications($event)">
        </ion-toggle>
      </ion-item>

      <ion-item class="settings-item">
        <ion-icon slot="start" name="color-palette-outline"></ion-icon>
        <ion-label>Tmavý režim</ion-label>
        <ion-toggle slot="end" [checked]="isDarkMode" (ionChange)="toggleTheme($event)"></ion-toggle>
      </ion-item>

      <ion-item button (click)="showPrivacyPolicy()" class="settings-item">
        <ion-icon slot="start" name="shield-checkmark-outline"></ion-icon>
        <ion-label>Ochrana údajů</ion-label>
      </ion-item>
    </ion-list>

    <div class="logout-wrapper">
      <ion-button (click)="logout()" expand="block" fill="clear" class="logout-btn">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        Odhlásit se
      </ion-button>
    </div>
  </div>
</ion-content>
