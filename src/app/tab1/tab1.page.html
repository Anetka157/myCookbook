<ion-header>
  <ion-toolbar>
    <ion-title>Recepty</ion-title>
  </ion-toolbar>

  <!-- vyhledávání -->
  <ion-toolbar>
    <ion-searchbar
      [(ngModel)]="searchTerm"
      (ionInput)="filterRecipes()"
      placeholder="Hledat recept...">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>

    <ion-card *ngFor="let recipe of filteredRecipes">

      <img [src]="recipe.image" />

      <ion-card-header>
        <ion-card-title>
          {{recipe.title}}
        </ion-card-title>
      </ion-card-header>

    </ion-card>

  </ion-list>

</ion-content>
