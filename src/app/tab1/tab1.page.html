<ion-header>

  <ion-toolbar>
    <ion-title>Recepty</ion-title>
  </ion-toolbar>

  <ion-toolbar>

    <ion-searchbar
      [(ngModel)]="searchTerm"
      placeholder="Hledat recept...">
    </ion-searchbar>

    <ion-buttons slot="end">
      <ion-button (click)="openFilter()">
        <ion-icon name="options-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>

</ion-header>

<ion-content>

  <ion-card *ngFor="let recipe of recipes">

    <img [src]="recipe.image" />

    <ion-card-header>
      <ion-card-title>
        {{recipe.title}}
      </ion-card-title>
    </ion-card-header>

  </ion-card>

  <ion-infinite-scroll threshold="100px" (ionInfinite)="loadMore($event)">

    <ion-infinite-scroll-content
      loadingSpinner="bubbles"
      loadingText="Načítám další recepty...">
    </ion-infinite-scroll-content>

  </ion-infinite-scroll>

</ion-content>
