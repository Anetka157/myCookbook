<ion-header>
  <ion-toolbar>
    <ion-title>Recepty</ion-title>
  </ion-toolbar>

  <ion-searchbar
    [(ngModel)]="searchTerm"
    (ionInput)="filterRecipes()"
    placeholder="Hledat recept">
  </ion-searchbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-item *ngFor="let meal of filteredRecipes">
      <ion-thumbnail slot="start">
        <img [src]="meal.strMealThumb">
      </ion-thumbnail>

      <ion-label>
        <h2>{{ meal.strMeal }}</h2>
        <p>{{ meal.strCategory }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
